<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GogoCRM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { margin:0; background:#0a0c0e; font-family:'Segoe UI',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:#111416; border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:2.5rem; width:100%; max-width:380px; }
.login-brand { font-size:1.4rem; font-weight:800; color:#f0f3f6; margin-bottom:0.3rem; }
.login-brand span { color:#3b82f6; }
.login-sub { font-size:0.8rem; color:#4a5568; margin-bottom:2rem; letter-spacing:0.08em; text-transform:uppercase; }
.form-control { background:#1e2328!important; border:1px solid rgba(255,255,255,0.12)!important; color:#f0f3f6!important; border-radius:8px; padding:0.65rem 1rem; margin-bottom:0.8rem; }
.form-control:focus { box-shadow:0 0 0 2px rgba(37,99,235,0.3)!important; outline:none; border-color:#2563eb!important; }
.form-label { font-size:0.72rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#4a5568; margin-bottom:0.3rem; }
.btn-login { width:100%; background:#2563eb; color:#fff; border:none; border-radius:8px; padding:0.7rem; font-weight:700; font-size:0.9rem; cursor:pointer; margin-top:0.5rem; }
.btn-login:hover { background:#3b82f6; }
.error { color:#fca5a5; font-size:0.8rem; margin-bottom:0.8rem; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-brand">Gogo<span>CRM</span></div>
  <div class="login-sub">GoGoDevS — Panel de gestión</div>
  {% if form.errors %}
    <div class="error">Usuario o contraseña incorrectos.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label class="form-label">Usuario</label>
    <input type="text" name="username" class="form-control" autofocus placeholder="diego">
    <label class="form-label">Contraseña</label>
    <input type="password" name="password" class="form-control" placeholder="••••••••">
    <button type="submit" class="btn-login">Ingresar</button>
  </form>
</div>
</body>
</html>
